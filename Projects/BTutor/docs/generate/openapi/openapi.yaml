components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer Token
  parameters:
    OffsetParam:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
      description: 分頁起始位置
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: 每頁筆數
  schemas:
    UserAccount:
      type: object
      description: USR001 使用者帳號主檔（學生 / 教練 / 標注者 / 研究者）
      properties:
        userId:
          type: string
          maxLength: 60
          description: 使用者帳號
        displayName: &id001
          type: string
          maxLength: 100
          description: 顯示名稱
        userType: &id002
          type: string
          maxLength: 1
          x-ref-code: UserType
          description: 使用者類型
        email: &id003
          type: string
          maxLength: 150
          x-sensitive: true
          description: 電子郵件
        passwordHash: &id004
          type: string
          maxLength: 150
          x-sensitive: true
          description: 密碼雜湊
        enabled: &id005
          type: boolean
          description: 是否啟用
        createdAt:
          type: string
          format: date-time
          description: 建立時間
      required:
      - userId
      - displayName
      - userType
      - email
      - passwordHash
      - enabled
      - createdAt
    UserAccountRequest:
      type: object
      description: USR001 使用者帳號主檔（學生 / 教練 / 標注者 / 研究者） 請求體
      properties:
        displayName: *id001
        userType: *id002
        email: *id003
        passwordHash: *id004
        enabled: *id005
      required:
      - displayName
      - userType
      - email
      - passwordHash
      - enabled
    StudentProfile:
      type: object
      description: STU001 學生認知檔案（涵蓋中級卡關玩家與青少年學習者）
      properties:
        studentId:
          type: string
          maxLength: 60
          description: 學生帳號
        cognitiveLevel: &id006
          type: string
          maxLength: 1
          x-ref-code: CognitiveLevel
          description: 認知層級
        enrolledAt: &id007
          type: string
          format: date-time
          description: 建檔時間
      required:
      - studentId
      - cognitiveLevel
      - enrolledAt
    StudentProfileRequest:
      type: object
      description: STU001 學生認知檔案（涵蓋中級卡關玩家與青少年學習者） 請求體
      properties:
        cognitiveLevel: *id006
        enrolledAt: *id007
      required:
      - cognitiveLevel
      - enrolledAt
    CoachStudentLink:
      type: object
      description: CSL001 教練與學生的指導關係
      properties:
        linkId:
          type: string
          maxLength: 60
          description: 關係編號
        coachId: &id008
          type: string
          maxLength: 60
          description: 教練
        studentId: &id009
          type: string
          maxLength: 60
          description: 學生
        linkedAt: &id010
          type: string
          format: date-time
          description: 建立時間
      required:
      - linkId
      - coachId
      - studentId
      - linkedAt
    CoachStudentLinkRequest:
      type: object
      description: CSL001 教練與學生的指導關係 請求體
      properties:
        coachId: *id008
        studentId: *id009
        linkedAt: *id010
      required:
      - coachId
      - studentId
      - linkedAt
    GuardianStudentLink:
      type: object
