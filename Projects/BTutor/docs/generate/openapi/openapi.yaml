openapi: 3.0.3
info:
  title: Bridge Cognitive Tutor API
  version: 1.0.0
  description: AI 驅動、可診斷、可解釋的橋牌認知學習系統；MVP 聚焦 Entry Management Tutor（橋引管理教練）。
servers:
- url: http://localhost:8080/api/v1
  description: 本機開發
security:
- bearerAuth: []
tags:
- name: 訓練指派 API
  description: 教練派發針對性訓練；學生讀取自己的指派（CON-ASSIGN-001 限指導關係）
- name: 賽後教學 API
  description: 讀取賽後教學說明與下一步訓練建議（LLM 產生，只 narration）
- name: 認知技能 API
  description: 認知本體技能節點的讀取（已登入者）與維護（標注者）；構成 skill graph
- name: 牌例管理 API
  description: curated Entry Management 牌例的 CRUD（標注者管理、已登入者可讀取練習目錄）
- name: 認知診斷 API
  description: 讀取基於證據的診斷（含 DiagnosisEvidence）；教練可覆核並標記分歧（CoachReview）
- name: 本體演化提案 API
  description: pattern-miner 提出本體演化提案；治理者核可 / 駁回（CON-GOV-001，AI suggests human governs）
- name: 練習 Session API
  description: 學生練習牌例；出牌 / 提示 / 推理標記為 session 上的業務操作（ActionTrace / HintEvent / ReasoningTag）
- name: 可重現重播 API
  description: 在指定 ontology / rule 版本下重播學習軌跡（Debug / Research / Student-History）
- name: 局面標注 API
  description: 牌例的 Situation DSL 標注建立 / 更新（標注者）；完整性檢核見 CON-ANNO-001
- name: 認知精熟度 API
  description: 讀取學生多維 partial mastery（學生本人 / 教練 / 家長 / 研究者，依範圍）；CDM 估計見 CON-MASTERY-002
paths:
  /assignment:
    get:
      operationId: listAssignment
      summary: 教練派發針對性訓練；學生讀取自己的指派（CON-ASSIGN-001 限指導關係）
      tags:
      - 訓練指派 API
      security:
      - bearerAuth: []
      x-required-roles:
      - student
      - coach
      x-required-permissions:
      - assignment_read_own
      - assignment_read_team
      parameters:
      - name: studentId
        in: query
        required: false
        schema:
          type: string
      - name: coachId
        in: query
        required: false
        schema:
          type: string
      - name: targetSkillId
        in: query
        required: false
        schema:
          type: string
      - name: status
        in: query
        required: false
        schema:
          type: string
      - $ref: '#/components/parameters/OffsetParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Assignment'
                  total:
                    type: integer
                  offset:
                    type: integer
                  limit:
                    type: integer
        '400':
          description: 請求參數錯誤
        '401':
          description: 未授權
        '403':
          description: 權限不足
        '404':
          description: 資源不存在
        '500':
          description: 伺服器錯誤
    post:
      operationId: createAssignment
      summary: 教練派發針對性訓練；學生讀取自己的指派（CON-ASSIGN-001 限指導關係）
      tags:
      - 訓練指派 API
      security:
      - bearerAuth: []
      x-required-roles:
      - coach
      x-required-permissions:
      - assignment_create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentRequest'
      responses:
        '400':
          description: 請求參數錯誤
        '401':
          description: 未授權
        '403':
          description: 權限不足
        '404':
          description: 資源不存在
        '500':
          description: 伺服器錯誤
        '201':
          description: 建立成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
