# bridge-cognitive-tutor.haarm.yaml
# Generated by rapt-form-haarm (rendered by rapt-modeling planner)
# Source: docs/discovery/01-stakeholders.md; docs/ssot/dbml/schema.dbml
# DSL: haARM v3.3.0

metadata:
  title: Bridge Cognitive Tutor Access Control
  version: "3.3.0"
  namespace: bridge_cognitive_tutor

actors:
  - id: intermediate-player
    name: 中級卡關玩家
    type: user
  - id: junior-learner
    name: 青少年 / MiniBridge 學習者
    type: user
  - id: human-coach
    name: 人類教練
    type: user
  - id: domain-expert-annotator
    name: 橋藝專家 / 標注者
    type: user
  - id: researcher
    name: 研究者
    type: external
  - id: parent-school
    name: 家長 / 學校
    type: user
  - id: diagnosis-engine
    name: 診斷引擎
    type: service
  - id: student-model
    name: 學生模型
    type: service
  - id: explanation-layer
    name: 教學解釋層
    type: service
  - id: pattern-miner
    name: 樣式挖掘服務
    type: service

roles:
  - id: authenticated
    name: 已登入者
    implicit: true
    permissions:
      - curated_deal_read
      - cognitive_skill_read
      - ontology_version_read
      - rule_set_read
      - diagnosis_rule_read
  - id: student
    name: 學生
    permissions:
      - play_session_create
      - play_session_read_own
      - action_trace_create
      - action_trace_read_own
      - hint_event_create
      - reasoning_tag_create
      - diagnosis_read_own
      - diagnosis_evidence_read_own
      - coaching_feedback_read_own
      - student_skill_state_read_own
      - student_profile_read_own
      - assignment_read_own
  - id: coach
    name: 教練
    permissions:
      - coach_student_link_read_own
      - student_profile_read_team
      - play_session_read_team
      - diagnosis_read_team
      - diagnosis_evidence_read_team
      - student_skill_state_read_team
      - coaching_feedback_read_team
      - coach_review_create
      - assignment_create
      - assignment_read_team
  - id: annotator
    name: 標注者
    permissions:
      - curated_deal_create
      - curated_deal_update
      - situation_annotation_read
      - situation_annotation_create
      - situation_annotation_update
      - cognitive_skill_create
      - cognitive_skill_update
      - rule_set_create
      - diagnosis_rule_create
      - diagnosis_rule_update
      - replay_run_create
      - replay_run_read
  - id: governance
    name: 治理者
    permissions:
      - ontology_proposal_read
      - ontology_proposal_review
      - ontology_version_create
      - ontology_version_publish
      - replay_run_create
      - replay_run_read
  - id: researcher
    name: 研究者
    permissions:
      - learning_event_read
      - diagnosis_read_all
      - student_skill_state_read_all
      - replay_run_create
      - replay_run_read
  - id: parent-school
    name: 家長 / 學校
    permissions:
      - guardian_student_link_read_own
      - student_profile_read_ward
      - student_skill_state_read_ward
  - id: diagnosis-engine
    name: 診斷引擎服務
    permissions:
      - diagnosis_create
      - diagnosis_evidence_create
      - learning_event_append
  - id: student-model
    name: 學生模型服務
    permissions:
      - student_skill_state_upsert
      - learning_event_append
  - id: explanation-layer
    name: 教學解釋服務
    permissions:
      - coaching_feedback_create
      - learning_event_append
  - id: pattern-miner
    name: 樣式挖掘服務
    permissions:
      - learning_event_read
      - ontology_proposal_create

resources:
  - id: user_account
    name: 使用者帳號
    type: entity
    fields: [email, passwordHash]
  - id: student_profile
    name: 學生檔案
    type: entity
    fields: []
  - id: coach_student_link
    name: 教練學生關係
    type: entity
    fields: []
  - id: guardian_student_link
    name: 監護關係
    type: entity
    fields: []
  - id: curated_deal
    name: 牌例
    type: entity
    fields: []
  - id: situation_annotation
    name: 局面標注
    type: entity
    fields: []
  - id: ontology_version
    name: 本體版本
    type: entity
    fields: []
  - id: cognitive_skill
    name: 認知技能
    type: entity
    fields: []
  - id: rule_set
    name: 規則集
    type: entity
    fields: []
  - id: diagnosis_rule
    name: 診斷規則
    type: entity
    fields: []
  - id: ontology_proposal
    name: 本體演化提案
    type: entity
    fields: []
  - id: play_session
    name: 練習
    type: entity
    fields: []
  - id: action_trace
    name: 出牌紀錄
    type: entity
    fields: []
  - id: hint_event
    name: 提示紀錄
    type: entity
    fields: []
  - id: reasoning_tag
    name: 推理標記
    type: entity
    fields: []
  - id: diagnosis
    name: 診斷
    type: entity
    fields: []
  - id: diagnosis_evidence
    name: 診斷證據
    type: entity
    fields: []
  - id: coaching_feedback
    name: 賽後教學
    type: entity
    fields: []
  - id: coach_review
    name: 教練覆核
    type: entity
    fields: []
  - id: student_skill_state
    name: 認知精熟度
    type: entity
    fields: []
  - id: assignment
    name: 訓練指派
    type: entity
    fields: []
  - id: learning_event
    name: 學習事件
    type: entity
    fields: []
  - id: replay_run
    name: 重播
    type: entity
    fields: []

permissions:
  # --- 公開參考讀取（authenticated implicit role）---
  - id: curated_deal_read
    resource: curated_deal
    action: read
    scope: all
  - id: cognitive_skill_read
    resource: cognitive_skill
    action: read
    scope: all
  - id: ontology_version_read
    resource: ontology_version
    action: read
    scope: all
  - id: rule_set_read
    resource: rule_set
    action: read
    scope: all
  - id: diagnosis_rule_read
    resource: diagnosis_rule
    action: read
    scope: all

  # --- 學生（own）---
  - id: play_session_create
    resource: play_session
    action: create
    scope: own
    conditions:
      - field: studentId
        operator: eq
        value: "$self.user_id"
  - id: play_session_read_own
    resource: play_session
    action: read
    scope: own
    conditions:
      - field: studentId
        operator: eq
        value: "$self.user_id"
  - id: action_trace_create
    resource: action_trace
    action: create
    scope: own
  - id: action_trace_read_own
    resource: action_trace
    action: read
    scope: own
  - id: hint_event_create
    resource: hint_event
    action: create
    scope: own
  - id: reasoning_tag_create
    resource: reasoning_tag
    action: create
    scope: own
  - id: diagnosis_read_own
    resource: diagnosis
    action: read
    scope: own
  - id: diagnosis_evidence_read_own
    resource: diagnosis_evidence
    action: read
    scope: own
  - id: coaching_feedback_read_own
    resource: coaching_feedback
    action: read
    scope: own
  - id: student_skill_state_read_own
    resource: student_skill_state
    action: read
    scope: own
  - id: student_profile_read_own
    resource: student_profile
    action: read
    scope: own
    conditions:
      - field: studentId
        operator: eq
        value: "$self.user_id"
  - id: assignment_read_own
    resource: assignment
    action: read
    scope: own
    conditions:
      - field: studentId
        operator: eq
        value: "$self.user_id"

  # --- 教練（team：依 CoachStudentLink 指導關係）---
  - id: coach_student_link_read_own
    resource: coach_student_link
    action: read
    scope: own
    conditions:
      - field: coachId
        operator: eq
        value: "$self.user_id"
  - id: student_profile_read_team
    resource: student_profile
    action: read
    scope: team
  - id: play_session_read_team
    resource: play_session
    action: read
    scope: team
  - id: diagnosis_read_team
    resource: diagnosis
    action: read
    scope: team
  - id: diagnosis_evidence_read_team
    resource: diagnosis_evidence
    action: read
    scope: team
  - id: student_skill_state_read_team
    resource: student_skill_state
    action: read
    scope: team
  - id: coaching_feedback_read_team
    resource: coaching_feedback
    action: read
    scope: team
  - id: coach_review_create
    resource: coach_review
    action: create
    scope: team
  - id: assignment_create
    resource: assignment
    action: create
    scope: team
  - id: assignment_read_team
    resource: assignment
    action: read
    scope: team

  # --- 家長 / 學校（ward：依 GuardianStudentLink 監護關係）---
  - id: guardian_student_link_read_own
    resource: guardian_student_link
    action: read
    scope: own
    conditions:
      - field: guardianId
        operator: eq
        value: "$self.user_id"
  - id: student_profile_read_ward
    resource: student_profile
    action: read
    scope: team
  - id: student_skill_state_read_ward
    resource: student_skill_state
    action: read
    scope: team

  # --- 標注者（content）---
  - id: curated_deal_create
    resource: curated_deal
    action: create
    scope: all
  - id: curated_deal_update
    resource: curated_deal
    action: update
    scope: all
  - id: situation_annotation_read
    resource: situation_annotation
    action: read
    scope: all
  - id: situation_annotation_create
    resource: situation_annotation
    action: create
    scope: all
  - id: situation_annotation_update
    resource: situation_annotation
    action: update
    scope: all
  - id: cognitive_skill_create
    resource: cognitive_skill
    action: create
    scope: all
  - id: cognitive_skill_update
    resource: cognitive_skill
    action: update
    scope: all
  - id: rule_set_create
    resource: rule_set
    action: create
    scope: all
  - id: diagnosis_rule_create
    resource: diagnosis_rule
    action: create
    scope: all
  - id: diagnosis_rule_update
    resource: diagnosis_rule
    action: update
    scope: all

  # --- 治理者（ontology governance）---
  - id: ontology_proposal_read
    resource: ontology_proposal
    action: read
    scope: all
  - id: ontology_proposal_review
    resource: ontology_proposal
    action: update
    scope: all
  - id: ontology_version_create
    resource: ontology_version
    action: create
    scope: all
  - id: ontology_version_publish
    resource: ontology_version
    action: update
    scope: all

  # --- 重播 ---
  - id: replay_run_create
    resource: replay_run
    action: create
    scope: all
  - id: replay_run_read
    resource: replay_run
    action: read
    scope: all

  # --- 研究者（read-only 遙測）---
  - id: learning_event_read
    resource: learning_event
    action: read
    scope: all
  - id: diagnosis_read_all
    resource: diagnosis
    action: read
    scope: all
  - id: student_skill_state_read_all
    resource: student_skill_state
    action: read
    scope: all

  # --- 服務 actor（least-privilege writes）---
  - id: diagnosis_create
    resource: diagnosis
    action: create
    scope: all
  - id: diagnosis_evidence_create
    resource: diagnosis_evidence
    action: create
    scope: all
  - id: coaching_feedback_create
    resource: coaching_feedback
    action: create
    scope: all
  - id: student_skill_state_upsert
    resource: student_skill_state
    action: update
    scope: all
  - id: learning_event_append
    resource: learning_event
    action: create
    scope: all
  - id: ontology_proposal_create
    resource: ontology_proposal
    action: create
    scope: all

access_control: []

constraints:
  - id: sod_governance_approval
    type: authorization
    description: "本體演化提案的核可（ontology_proposal_review）僅限 governance 角色；對應 constraints.md CON-GOV-001。"
  - id: coach_team_scope
    type: scope
    description: "教練 team scope 解析為 CoachStudentLink 中該教練指導的學生；對應 CON-REVIEW-001 / CON-ASSIGN-001。"

# 註（MOD-001 已解，CLR-260616-01#Q7）：researcher 對 learning_event / diagnosis / student_skill_state
#       採 scope: all，但僅可存取「去識別化」後資料；去識別化於 haAPI 查詢層執行（constraints.md CON-PRIV-001）。
# 註（ASM-002 已解，CLR-260616-01#Q8）：parent-school 已納入 MVP — 新增 parent-school actor/role、
#       guardian_student_link resource 與 ward 範圍權限；家長僅可檢視監護學習者之精熟/進展（CON-GUARD-001）。
# 註（ASM-004 已解）：discovery 事件流的 `system` actor 已細分為 diagnosis-engine / student-model /
#       explanation-layer / pattern-miner 四個 service actor。
