proposal:
  title: 新增商品評論
  source_ref: what-if/0619-addComment.md
  mode: greenfield-with-ssot
  summary: >-
    允許顧客對「已購買」的商品撰寫評論（1~5 星評分＋文字），評論與訂單綁定；
    商家可管理自店商品評論（顯示／隱藏／刪除），平台 admin 可管理全平台評論。
  entities: [ProductReview, Product, Order, OrderItem, Member]
  actions: [create_review, view_review, moderate_review, delete_review]
  actors: [consumer, merchant, platform-admin]
  expected_outcomes:
    - 顧客在商品頁查看評論並對已購商品評分／留言
    - 商家對自店評論做顯示／隱藏／刪除
    - 平台 admin 管理所有評論
  explicit_constraints:
    - 僅已購買者可評論（評論 -> 訂單 -> 訂單項目 -> 商品）
    - 評論狀態：顯示／隱藏／刪除
  ambiguities:
    - 「已購買」資格認定層級與門檻未定義（per OrderItem / per Product / 需訂單狀態）
    - 刪除為軟刪除或硬刪除、商家可否任意隱藏未定義
    - 是否在商品上反正規化平均星等／評論數未定義
    - 商品下架／刪除後評論保留與顯示策略未定義
    - 評論審核操作是否納入 AuditLog 未定義

