facets:
  data:
    - 新 aggregate ProductReview（評分/內容/狀態/時間/評論者/評論對象/訂單綁定）
    - 評分聚合是否反正規化至 Product（衍生資料一致性，比照 COMPAT-03/04）
    - 評論 -> Order/OrderItem/Product/Member 外鍵與資格查詢路徑
  api:
    - 新 product-review API（create/list/read + moderate）
    - 評論資格驗證（建立時檢查 memberId 對應已購 Order/OrderItem）
    - 既有 product API 是否暴露評分摘要
  ui:
    - 顧客評論表單、商品頁評論列表（須補 product-detail 頁）
    - 商家/admin 評論管理列表（顯示/隱藏/刪除）
  permission:
    - consumer review_create_own（比照 wishlist_*_own，memberId 條件）
    - merchant review_list_store/review_moderate_store（store 隔離，比照 *_update_store）
    - platform-admin review_list_all/review_moderate_all（比照 audit_log_read_all）
    - 商家可否任意隱藏（審查/言論政策邊界）
  behavior:
    - 顧客評論建立（限已購）、查看；商家/admin 審核狀態流轉（顯示/隱藏/刪除）
    - product-browsing 商品頁新增評論顯示（附加）
    - 下架/刪除商品 vs 既有評論（SCN-PRODUCT-005 互動）
  traceability:
    - L1 新 US、L2 新 SCN、L3 新 intent mapping；product-browsing 列更新
  generated:
    - openapi/lofi/pdl 待 accept 後重新 generate（deferred）

