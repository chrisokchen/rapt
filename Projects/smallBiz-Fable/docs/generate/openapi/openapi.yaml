      - bearerAuth: []
      x-required-roles:
      - merchant
      - platform-admin
      x-required-permissions:
      - audit_log_read_store
      - audit_log_read_all
      parameters:
      - name: actorType
        in: query
        required: false
        schema:
          type: string
      - name: action
        in: query
        required: false
        schema:
          type: string
      - name: targetEntity
        in: query
        required: false
        schema:
          type: string
      - name: createdAt
        in: query
        required: false
        schema:
          type: string
      - $ref: '#/components/parameters/OffsetParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditLog'
                  total:
                    type: integer
                  offset:
                    type: integer
                  limit:
                    type: integer
        '400':
          description: 請求參數錯誤
        '401':
          description: 未授權
        '403':
          description: 權限不足
        '404':
          description: 資源不存在
        '500':
          description: 伺服器錯誤
