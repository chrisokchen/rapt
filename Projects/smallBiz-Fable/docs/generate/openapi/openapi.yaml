components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer Token
  parameters:
    OffsetParam:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
      description: 分頁起始位置
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: 每頁筆數
  schemas:
    Merchant:
      type: object
      description: MER001 商家主體（月租店家；登入操作者見 MerchantOperator，本表 email/password 為 owner 引導帳號）
      properties:
        merchantId:
          type: string
          maxLength: 60
          description: 商家編號
        email: &id001
          type: string
          maxLength: 100
          x-sensitive: true
          description: 登入信箱
        password: &id002
          type: string
          maxLength: 150
          x-sensitive: true
          description: 密碼
        name: &id003
          type: string
          maxLength: 100
          description: 商家名稱
        phone: &id004
          type: string
          maxLength: 20
          x-sensitive: true
          description: 聯絡電話
        status: &id005
          type: string
          maxLength: 1
          x-ref-code: MerchantStatus
          description: 帳號狀態
        createdAt:
          type: string
          format: date-time
          description: 註冊時間
        activatedAt: &id006
          type: string
          format: date-time
          description: 開通時間
      required:
      - merchantId
      - email
      - password
      - name
      - status
      - createdAt
    MerchantRequest:
      type: object
      description: MER001 商家主體（月租店家；登入操作者見 MerchantOperator，本表 email/password 為 owner 引導帳號） 請求體
      properties:
        email: *id001
        password: *id002
        name: *id003
        phone: *id004
        status: *id005
        activatedAt: *id006
      required:
      - email
      - password
      - name
      - status
    MerchantOperator:
      type: object
      description: MER002 商家操作帳號（隸屬單一 Merchant CON-MOP-001；店面隔離以 operator→merchant→store 推導）
      properties:
        operatorId:
          type: string
          maxLength: 60
          description: 操作者編號
        merchantId: &id007
          type: string
          maxLength: 60
          description: 所屬商家
        email: &id008
          type: string
          maxLength: 100
          x-sensitive: true
          description: 登入信箱
        password: &id009
          type: string
          maxLength: 150
          x-sensitive: true
          description: 密碼
        name: &id010
          type: string
          maxLength: 100
          description: 操作者姓名
        isOwner: &id011
          type: boolean
          description: 是否店主
        status: &id012
          type: string
          maxLength: 1
          x-ref-code: OperatorStatus
          description: 帳號狀態
        createdAt:
          type: string
          format: date-time
          description: 建立時間
      required:
      - operatorId
      - merchantId
      - email
      - password
      - name
      - isOwner
      - status
      - createdAt
    MerchantOperatorRequest:
      type: object
      description: MER002 商家操作帳號（隸屬單一 Merchant CON-MOP-001；店面隔離以 operator→merchant→store 推導） 請求體
      properties:
        merchantId: *id007
        email: *id008
        password: *id009
        name: *id010
        isOwner: *id011
        status: *id012
      required:
      - merchantId
      - email
      - password
      - name
      - isOwner
      - status
    Store:
      type: object
      description: STO001 店面主檔（MVP 一商家一店面；狀態與商家帳號同步 CON-MER-003）
      properties:
        storeId:
          type: string
          maxLength: 60
          description: 店面編號
        merchantId: &id013
          type: string
          maxLength: 60
          description: 所屬商家
        storeName: &id014
          type: string
          maxLength: 100
          description: 店面名稱
        status: &id015
          type: string
          maxLength: 1
          x-ref-code: StoreStatus
          description: 營運狀態
        createdAt:
          type: string
          format: date-time
          description: 建立時間
      required:
      - storeId
      - merchantId
      - storeName
      - status
      - createdAt
    StoreRequest:
      type: object
      description: STO001 店面主檔（MVP 一商家一店面；狀態與商家帳號同步 CON-MER-003） 請求體
      properties:
        merchantId: *id013
        storeName: *id014
        status: *id015
      required:
      - merchantId
      - storeName
      - status
    PlatformUser:
      type: object
      description: 'PLT001 平台人員帳號（admin/marketer 角色拆分 ASM #003 未決；功能範圍 GAP #005）'
      properties:
        platformUserId:
          type: string
          maxLength: 60
          description: 平台人員編號
        email: &id016
          type: string
          maxLength: 100
          x-sensitive: true
          description: 登入信箱
        password: &id017
          type: string
          maxLength: 150
          x-sensitive: true
          description: 密碼
        name: &id018
          type: string
          maxLength: 100
          description: 姓名
        roleCode: &id019
          type: string
          maxLength: 20
          x-ref-code: PlatformRole
          description: 平台角色
        isActive: &id020
          type: boolean
          description: 是否啟用
      required:
      - platformUserId
      - email
      - password
      - name
      - roleCode
      - isActive
    PlatformUserRequest:
      type: object
      description: 'PLT001 平台人員帳號（admin/marketer 角色拆分 ASM #003 未決；功能範圍 GAP #005） 請求體'
      properties:
        email: *id016
        password: *id017
        name: *id018
        roleCode: *id019
        isActive: *id020
      required:
      - email
      - password
      - name
      - roleCode
      - isActive
    Category:
      type: object
      description: CAT001 商品分類（多層樹狀，parentCategoryId 自引用）
      properties:
        categoryId:
          type: string
          maxLength: 60
          description: 分類編號
        storeId: &id021
          type: string
          maxLength: 60
          description: 所屬店面
        parentCategoryId: &id022
          type: string
          maxLength: 60
          description: 上層分類
        name: &id023
          type: string
          maxLength: 100
          description: 分類名稱
        sortOrder: &id024
          type: integer
          format: int32
          description: 排序
      required:
      - categoryId
      - storeId
      - name
    CategoryRequest:
      type: object
      description: CAT001 商品分類（多層樹狀，parentCategoryId 自引用） 請求體
      properties:
        storeId: *id021
        parentCategoryId: *id022
        name: *id023
        sortOrder: *id024
      required:
      - storeId
      - name
    Brand:
      type: object
      description: CAT002 品牌
      properties:
        brandId:
          type: string
          maxLength: 60
          description: 品牌編號
        storeId: &id025
          type: string
          maxLength: 60
          description: 所屬店面
        name: &id026
          type: string
          maxLength: 100
          description: 品牌名稱
      required:
      - brandId
      - storeId
      - name
    BrandRequest:
      type: object
      description: CAT002 品牌 請求體
      properties:
        storeId: *id025
        name: *id026
      required:
      - storeId
      - name
    Product:
      type: object
      description: PRD001 商品主檔（狀態轉換 CON-PRD-004；上架前提 CON-PRD-002）
      properties:
