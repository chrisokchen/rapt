openapi: 3.0.3
info:
  title: smallBiz API
  version: 1.0.0
  description: 月租制、開箱即用的 B2C 電商平台，讓台灣中小零售商家自有線上商店、自管商品訂單與會員資料。
servers:
- url: http://localhost:8080/api/v1
  description: 本機開發
security:
- bearerAuth: []
tags:
- name: 稽核紀錄 API
  description: 高風險操作軌跡查詢（唯讀）
- name: 品牌 API
  description: 商品品牌維護
- name: 促銷活動 API
  description: 有檔期的促銷活動建立與自動上下架
- name: 購物車 API
  description: 購物車內容管理（跨裝置保留）
- name: 商品分類 API
  description: 多層商品分類維護
- name: 優惠券 API
  description: 優惠券發行、門檻/張數/效期/等級限定與套用
- name: 收件地址 API
  description: 會員常用收件地址維護
- name: 會員帳號 API
  description: 會員註冊、信箱驗證與基本資料維護
- name: 商家操作者 API
  description: 店主管理店員子帳號（一店多操作帳號）
- name: 商家報表 API
  description: 銷售概況與商品排行（唯讀聚合，讀模型基於 Order/OrderItem）
- name: 商家帳號 API
  description: 商家註冊、平台開通與停權
- name: 通知紀錄 API
  description: 會員收到的 LINE/Email 通知查詢（唯讀）
- name: 訂單 API
  description: 結帳成立、付款、商家確認出貨與取消
- name: 平台人員 API
  description: 平台管理員與行銷人員帳號維護
- name: 點數異動帳 API
  description: 會員點數獲得、折抵與效期查詢
- name: 商品規格 SKU API
  description: 規格組合 SKU 與售價維護
- name: 商品 API
  description: 商品建立、規格 SKU 設定與上下架
- name: 退貨申請 API
  description: 線上退貨申請、商家審核、退回確認與退款
- name: 出貨單 API
  description: 商家標記出貨、填入物流單號與配送狀態
- name: 庫存 API
  description: SKU 庫存設定、預留扣減與低水位通知
- name: 店面 API
  description: 店面基本資料維護與平台檢視
- name: 願望清單 API
  description: 會員收藏商品與降價通知（CLR-260613-03#GAP#002）
