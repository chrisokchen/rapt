    - {field: ontologyVersion, label: 本體版本, type: eq}
    - {field: cognitiveLevel, label: 認知層級, type: eq, ref_code: CognitiveLevel}
  columns:
    - {field: skillCode, label: 技能代碼, link: true, sortable: true}
