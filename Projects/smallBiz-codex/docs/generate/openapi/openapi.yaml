components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer Token
  parameters:
    OffsetParam:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
      description: 分頁起始位置
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: 每頁筆數
  schemas:
    Account:
      type: object
      description: ID001 帳號主檔
      properties:
        accountId:
          type: string
          maxLength: 60
          description: 帳號編號
        email: &id001
          type: string
          maxLength: 120
          x-sensitive: true
          description: 電子郵件
        passwordHash: &id002
          type: string
          maxLength: 150
          x-sensitive: true
          description: 密碼雜湊
        accountType: &id003
          type: string
          maxLength: 1
          x-ref-code: AccountType
          description: 帳號類型
        accountStatus: &id004
          type: string
          maxLength: 1
          x-ref-code: AccountStatus
          description: 帳號狀態
        emailVerifiedAt: &id005
          type: string
          format: date-time
          description: 信箱驗證時間
        createdAt:
          type: string
          format: date-time
          description: 建立時間
        updatedAt:
          type: string
          format: date-time
          description: 更新時間
      required:
      - accountId
      - email
      - passwordHash
      - accountType
      - accountStatus
      - createdAt
      - updatedAt
    AccountRequest:
      type: object
      description: ID001 帳號主檔 請求體
      properties:
        email: *id001
        passwordHash: *id002
        accountType: *id003
        accountStatus: *id004
        emailVerifiedAt: *id005
      required:
      - email
      - passwordHash
      - accountType
      - accountStatus
    Merchant:
      type: object
      description: ID002 商家主檔
      properties:
        merchantId:
          type: string
          maxLength: 60
          description: 商家編號
        ownerAccountId: &id006
          type: string
          maxLength: 60
          description: 負責人帳號
        merchantName: &id007
          type: string
          maxLength: 120
          description: 商家名稱
        planStatus: &id008
          type: string
          maxLength: 1
          x-ref-code: MerchantPlanStatus
          description: 月租狀態
        createdAt:
          type: string
          format: date-time
          description: 建立時間
        updatedAt:
          type: string
          format: date-time
          description: 更新時間
      required:
      - merchantId
      - ownerAccountId
      - merchantName
      - planStatus
      - createdAt
      - updatedAt
    MerchantRequest:
      type: object
      description: ID002 商家主檔 請求體
      properties:
        ownerAccountId: *id006
        merchantName: *id007
        planStatus: *id008
      required:
      - ownerAccountId
      - merchantName
      - planStatus
    ConsumerProfile:
      type: object
      description: ID003 消費者會員資料
      properties:
        consumerId:
          type: string
          maxLength: 60
          description: 消費者編號
        accountId: &id009
          type: string
          maxLength: 60
          description: 帳號編號
        displayName: &id010
          type: string
          maxLength: 100
          description: 顯示名稱
        phone: &id011
          type: string
          maxLength: 30
          x-sensitive: true
          description: 聯絡電話
        memberLevelId: &id012
          type: string
          maxLength: 60
          description: 會員等級
        createdAt:
          type: string
          format: date-time
          description: 建立時間
        updatedAt:
          type: string
          format: date-time
          description: 更新時間
      required:
      - consumerId
      - accountId
      - createdAt
      - updatedAt
    ConsumerProfileRequest:
      type: object
      description: ID003 消費者會員資料 請求體
      properties:
        accountId: *id009
        displayName: *id010
        phone: *id011
        memberLevelId: *id012
      required:
      - accountId
    Address:
      type: object
      description: ID004 常用收件地址
      properties:
        addressId:
          type: string
          maxLength: 60
          description: 地址編號
        consumerId: &id013
          type: string
          maxLength: 60
          description: 消費者
        recipientName: &id014
          type: string
          maxLength: 100
          x-sensitive: true
          description: 收件人
        phone: &id015
          type: string
          maxLength: 30
          x-sensitive: true
          description: 收件電話
        postalCode: &id016
          type: string
          maxLength: 10
          description: 郵遞區號
        city: &id017
          type: string
          maxLength: 50
          description: 縣市
        district: &id018
          type: string
          maxLength: 50
          description: 行政區
        line1: &id019
          type: string
          maxLength: 200
          x-sensitive: true
          description: 地址
        isDefault: &id020
          type: boolean
          description: 預設地址
      required:
      - addressId
      - consumerId
      - recipientName
      - phone
      - city
      - district
      - line1
      - isDefault
