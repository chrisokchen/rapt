      - 購物車與結帳 API
      security:
      - bearerAuth: []
      x-required-roles:
      - consumer
      x-required-permissions:
      - cart_crud_own
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '400':
          description: 請求參數錯誤
        '401':
          description: 未授權
        '403':
          description: 權限不足
        '404':
          description: 資源不存在
        '500':
          description: 伺服器錯誤
    put:
