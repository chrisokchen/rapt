openapi: 3.0.3
info:
  title: SmallBiz 電商管理 API
  version: 1.0.0
  description: SmallBiz B2C 電商管理 API 預覽規格，由 haAPI、haARM 與 annotated DBML 產生。
servers:
- url: http://localhost:8080/api/v1
  description: 本機開發
security:
- bearerAuth: []
tags:
- name: 購物車與結帳 API
  description: 支援購物車、結帳金額試算與建立訂單。
- name: 庫存管理 API
  description: 支援 SKU 庫存調整、低庫存檢視與訂單庫存預留。
- name: 會員點數 API
  description: 支援點數查詢、點數累積與點數折抵；會員分級於 MVP 採手動維護。
- name: 會員帳戶 API
  description: 支援消費者註冊、驗證後啟用個人資料與維護會員基本資料。
- name: 商家報表 API
  description: 支援商家查看銷售、商品與零銷售期間報表。
- name: 付款與退款 API
  description: 支援付款狀態更新、退款查詢與金流服務商回寫。
- name: 平台管理 API
  description: 支援平台管理員檢視與維護平台帳戶、商家與全站資料邊界。
- name: 商品目錄 API
  description: 支援商家商品、SKU 與公開商品瀏覽的意圖規格。
- name: 促銷與優惠券 API
  description: 支援商家促銷、優惠券、會員等級資格與折扣疊加規則。
- name: 退貨退款 API
  description: 支援消費者退貨申請、商家審核與原路退款流程。
- name: 訂單 API
  description: 支援消費者訂單查詢、商家訂單管理、付款逾時取消與出貨前取消退款。
